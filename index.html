<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date — Jeffrey & Victoria</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: url('bg.jpg') center / cover no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene {
      position: relative;
      width: 730px;
      height: 520px;
    }

    .card-std {
      position: absolute;
      width: 364px;
      left: 0;
      top: 0;
      z-index: 2;
      box-shadow: 5px 5px 9px rgba(0, 0, 0, 0.14);
    }

    .card-photo {
      position: absolute;
      width: 413px;
      left: 305px;
      top: 130px;
      z-index: 1;
      transform: rotate(4.5deg);
      transform-origin: center;
      box-shadow: 5px 5px 9px rgba(0, 0, 0, 0.14);
    }

    @media (max-width: 800px) {
      .scene      { width: 380px; height: 270px; }
      .card-std   { width: 189px; }
      .card-photo { width: 215px; left: 158px; top: 68px; }
    }

    /* Slide Apart */
    .card-std {
      animation:
        apart-left-move 2.4s cubic-bezier(0.22, 1, 0.36, 1) both,
        apart-fade      0.5s ease-out both;
    }
    .card-photo {
      animation:
        apart-right-move 2.4s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both,
        apart-fade       0.5s ease-out 0.3s both;
    }
    @keyframes apart-left-move {
      from { transform: translateX(110px); }
      to   { transform: translateX(0); }
    }
    @keyframes apart-right-move {
      from { transform: translateX(-110px) rotate(0deg); }
      to   { transform: translateX(0) rotate(4.5deg); }
    }
    @keyframes apart-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <img class="card-std"   src="savethedate.jpg"  alt="Save the Date card">
    <img class="card-photo" src="savethedate2.jpg" alt="Jeffrey and Victoria">
  </div>
</body>
</html>
