<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card-frame {
      width: 100%;
      max-width: 600px;
    }

    .card-frame img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Placeholder shown when no image is set */
    .card-placeholder {
      width: 100%;
      aspect-ratio: 5 / 7;
      background: #f5f5f5;
      border: 1px dashed #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #999;
      font-family: sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="card-frame">
    <!--
      ✏️ CUSTOMIZE: Replace src with your save-the-date card image.
      Place the image file in the same folder as this index.html.
    -->
    <img src="card.jpg" alt="Save the Date"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
    <div class="card-placeholder" style="display: none;">
      <span style="font-size: 28px; opacity: 0.4;">🖼</span>
      <p>Replace src="card.jpg" with your image</p>
    </div>
  </div>

</body>
</html>
