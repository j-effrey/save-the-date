<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
    }

    h1 {
      color: #2563eb;
      margin-bottom: 0.5rem;
    }

    p {
      color: #555;
    }

    .success {
      margin-top: 1.5rem;
      color: #16a34a;
      font-weight: bold;
    }

    code {
      background: #eee;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 GitHub Pages Works!</h1>

    <p>
      If you're seeing this page, your GitHub Pages site is being served successfully.
    </p>

    <p>
      Repository:
      <br>
      <code>j-effrey.github.io</code>
    </p>

    <div class="success">
      ✅ Deployment Successful
    </div>

    <p id="time"></p>
  </div>

  <script>
    document.getElementById("time").textContent =
      "Loaded at: " + new Date().toLocaleString();
  </script>
</body>
</html>
